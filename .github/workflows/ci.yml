name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (installs the pinned bayeswire)
        run: uv sync
      - name: Format
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run ty check
      - name: Tests (includes consume-conformance against the bayeswire corpus)
        run: uv run pytest -q
