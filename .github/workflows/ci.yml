name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The bayes* repos are private; the default GITHUB_TOKEN is scoped to
      # this repo only. BAYES_REPOS_TOKEN is a fine-grained PAT with
      # contents:read on the same-owner dependencies (bayeswire).
      - name: Grant git read access to pinned same-owner dependencies
        env:
          BAYES_REPOS_TOKEN: ${{ secrets.BAYES_REPOS_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:${BAYES_REPOS_TOKEN}@github.com/StefanSko/".insteadOf "https://github.com/StefanSko/"
      - name: Preflight the bayeswire dependency
        run: |
          if ! git ls-remote https://github.com/StefanSko/bayeswire.git HEAD >/dev/null 2>&1; then
            echo "::error::Cannot read StefanSko/bayeswire. The bayes* repos are private: add a fine-grained PAT with contents:read on them as the BAYES_REPOS_TOKEN Actions secret of this repo."
            exit 1
          fi
      - name: Sync (installs the pinned bayeswire)
        run: uv sync
      - name: Format
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run ty check
      - name: Tests (includes consume-conformance against the bayeswire corpus)
        run: uv run pytest -q
